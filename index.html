<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Red Hope | Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #FF6B6B, #C0392B);
      --secondary-gradient: linear-gradient(135deg, #4facfe, #00f2fe);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f7f6;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
      animation: float 10s infinite alternate;
    }

    .orb1 {
      top: -10%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: rgba(255, 107, 107, 0.6);
    }

    .orb2 {
      bottom: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: rgba(79, 172, 254, 0.5);
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
      }

      100% {
        transform: translateY(30px) scale(1.1);
      }
    }

    .landing-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 650px;
      text-align: center;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
      animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-container {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      background: var(--primary-gradient);
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
      box-shadow: 0 10px 25px rgba(192, 57, 43, 0.4);
    }

    .landing-card h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .landing-card p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .btn {
      padding: 15px 35px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 107, 107, 0.6);
    }

    .btn-outline {
      background: transparent;
      color: #C0392B;
      border: 2px solid #C0392B;
    }

    .btn-outline:hover {
      background: rgba(192, 57, 43, 0.05);
      transform: translateY(-3px);
    }
  </style>
</head>

<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="landing-card">
    <div class="icon-container">
      <i class="fa-solid fa-heart-pulse"></i>
    </div>
    <h1>Red Hope</h1>
    <p>Connecting blood donors with people in need. Join Red Hope today and help save lives in your community.</p>

    <div class="button-group">
      <a href="register.html" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Register Now</a>
      <a href="login.html" class="btn btn-outline"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
    </div>
  </div>

</body>

</html>
